<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rat in a Maze</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>Rat in a Maze</h1>
      </header>

      <section class="toolbar">
        <div class="toolbar-config">
          <div class="control-group">
            <label for="size">Size (N×N)</label>
            <input type="number" id="size" min="3" max="15" value="5" />
          </div>
          <div class="control-group">
            <label for="blocked">Blocked Nodes</label>
            <input type="number" id="blocked" min="0" value="8" />
          </div>
          <button id="generateBtn" class="btn btn-generate">
            Generate Maze
          </button>
        </div>

        <div class="toolbar-actions">
          <button id="startBtn" class="btn btn-action" disabled>Start</button>
          <button id="pauseBtn" class="btn btn-action" disabled>Pause</button>
          <button id="restartBtn" class="btn btn-action" disabled>
            Restart
          </button>
          <span class="hint">Press <kbd>Space</kbd> to start/pause</span>
        </div>
      </section>

      <main id="mazeContainer" class="maze-container"></main>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
